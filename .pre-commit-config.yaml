repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
        exclude: ^.devcontainer/devcontainer.json
      - id: pretty-format-json
        exclude: ^.devcontainer/devcontainer.json
        args: [--autofix]
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: [--number]
        exclude: ^(packages/ya-agent-sdk/.*\.md|examples/.*\.md|packages/yaacli/.*\.md|packages/yaacli/yaacli/skills/)$
        additional_dependencies:
          [mdformat-gfm, mdformat-front-matters, mdformat-footnote]
  - repo: local
    hooks:
      - id: prettier-web
        name: prettier web files
        entry: prettier --write
        language: node
        additional_dependencies: [prettier@3.6.2]
        files: ^apps/ya-claw-web/.*\.(ts|tsx|css|html|md)$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.12"
    hooks:
      - id: ruff
        args: [--exit-non-zero-on-fix]
      - id: ruff-format
