name: release-main

permissions:
  contents: write
  packages: write

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Sync skills folder
        run: bash scripts/sync-skills.sh

      - name: Build all packages
        run: uv build --all-packages -o dist

      - name: Inspect package version
        id: inspect_package
        run: |
          version=$(cd packages/ya-agent-sdk && uvx --with uv-dynamic-versioning hatchling version)
          echo "version=$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish packages to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Upload dists to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

      - name: Create skill zip archives
        run: python scripts/build-skill-zips.py

      - name: Upload skill zip archives to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*SKILL.zip
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
