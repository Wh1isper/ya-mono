name: Platform Image

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build YA Agent Platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ya-agent-platform
          push: false
          load: false
          tags: ya-agent-platform:pr
          cache-from: type=gha,scope=ya-agent-platform
          cache-to: type=gha,mode=max,scope=ya-agent-platform

  publish-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ya-agent-platform" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=ya-agent-platform
            org.opencontainers.image.description=TBD YA Agent Platform image

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ya-agent-platform
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ya-agent-platform
          cache-to: type=gha,mode=max,scope=ya-agent-platform

  publish-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ya-agent-platform" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ya-agent-platform
            org.opencontainers.image.description=TBD YA Agent Platform image

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ya-agent-platform
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ya-agent-platform
          cache-to: type=gha,mode=max,scope=ya-agent-platform
