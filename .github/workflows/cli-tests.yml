name: CLI Tests

on:
  push:
    branches:
      - main
    paths:
      - "packages/yaacli/**"
      - "packages/ya-agent-sdk/**"
      - "skills/**"
      - "scripts/sync-skills.sh"
      - "scripts/check-skills-sync.sh"
      - "scripts/build-skill-zips.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/cli-tests.yml"
      - ".github/actions/setup-python-env/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/yaacli/**"
      - "packages/ya-agent-sdk/**"
      - "skills/**"
      - "scripts/sync-skills.sh"
      - "scripts/check-skills-sync.sh"
      - "scripts/build-skill-zips.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/cli-tests.yml"
      - ".github/actions/setup-python-env/**"

jobs:
  cli-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          extras: "all"

      - name: Check bundled skills sync
        run: ./scripts/check-skills-sync.sh

      - name: Check release skill zip build
        run: python scripts/build-skill-zips.py --check

      - name: Run CLI tests
        run: uv run python -m pytest packages/yaacli/tests -n auto
