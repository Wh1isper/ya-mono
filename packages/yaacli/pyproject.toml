[project]
name = "yaacli"
dynamic = ["version", "dependencies"]
description = "TUI reference implementation for ya-agent-sdk"
authors = [{ name = "wh1isper", email = "jizhongsheng957@gmail.com" }]
readme = "README.md"
keywords = ["python", "cli", "tui", "ai-agent"]
requires-python = ">=3.11,<3.14"
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Environment :: Console",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Repository = "https://github.com/wh1isper/ya-mono"

[project.scripts]
yaacli = "yaacli.cli:cli"

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "ya-agent-sdk[all]=={{ version }}",
    "click>=8.0",
    "pillow>=10.0.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "pydantic-ai",
    "pyobjc-framework-Cocoa>=10.0; platform_system == 'Darwin'",
    "python-dotenv>=1.0.0",
    "y-agent-environment>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["yaacli"]

[tool.uv.sources]
ya-agent-sdk = { workspace = true }

[tool.deptry]
ignore = ["DEP001"]
package_module_name_map = { "click" = "click", "pillow" = "PIL", "pydantic" = "pydantic", "pydantic-ai" = "pydantic_ai", "pydantic-settings" = "pydantic_settings", "pyobjc-framework-Cocoa" = "AppKit|Foundation", "python-dotenv" = "dotenv", "ya-agent-sdk" = "ya_agent_sdk", "y-agent-environment" = "y_agent_environment" }
per_rule_ignores = { DEP001 = ["quick_validate"], DEP003 = ["anyio", "click", "dotenv", "prompt_toolkit", "pillow", "pydantic", "pydantic_ai", "pydantic_settings", "pyobjc-framework-Cocoa", "rich", "yaml", "y_agent_environment", "ya_agent_sdk", "yaacli"], DEP004 = ["pytest"] }
