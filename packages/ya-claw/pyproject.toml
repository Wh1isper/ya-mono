[project]
name = "ya-claw"
dynamic = ["version", "dependencies"]
description = "Workspace-native local-first agent runtime built on top of ya-agent-sdk"
authors = [{ name = "wh1isper", email = "jizhongsheng957@gmail.com" }]
readme = "README.md"
keywords = ["python", "fastapi", "agent-runtime", "workspace", "ai-agent"]
requires-python = ">=3.11,<3.14"
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: FastAPI",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Repository = "https://github.com/wh1isper/ya-mono"

[project.scripts]
ya-claw = "ya_claw.cli:cli"

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "alembic>=1.16.0",
    "click>=8.0",
    "fastapi>=0.116.0",
    "aiosqlite>=0.21.0",
    "pydantic>=2.12.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.1",
    "sqlalchemy>=2.0.0",
    "sse-starlette>=3.0.0",
    "uvicorn[standard]>=0.35.0",
    "ya-agent-sdk[all]=={{ version }}",
]

[tool.hatch.build.targets.wheel]
packages = ["ya_claw"]
include = [
    "ya_claw/alembic.ini",
    "ya_claw/alembic/**/*.py",
    "ya_claw/alembic/script.py.mako",
]

[tool.uv.sources]
ya-agent-sdk = { workspace = true }

[dependency-groups]
dev = [
    "deptry>=0.22.0",
    "httpx>=0.28.1",
    "pre-commit>=2.20.0",
    "pyright>=1.1.0",
    "pytest>=7.2.0",
    "pytest-asyncio>=0.25.3",
    "ruff>=0.9.2",
]

[tool.deptry]
ignore = ["DEP001"]
package_module_name_map = { "aiosqlite" = "aiosqlite", "alembic" = "alembic", "click" = "click", "fastapi" = "fastapi", "httpx" = "httpx", "pre-commit" = "pre_commit", "pydantic" = "pydantic", "pydantic-settings" = "pydantic_settings", "pytest" = "pytest", "pytest-asyncio" = "pytest_asyncio", "pyright" = "pyright", "python-dotenv" = "dotenv", "ruff" = "ruff", "sqlalchemy" = "sqlalchemy", "sse-starlette" = "sse_starlette", "uvicorn" = "uvicorn", "ya-agent-sdk" = "ya_agent_sdk" }
per_rule_ignores = { DEP003 = ["aiosqlite", "alembic", "click", "fastapi", "pydantic", "pydantic_settings", "sqlalchemy", "uvicorn", "ya_agent_sdk", "ya_claw"], DEP004 = ["pytest"] }
