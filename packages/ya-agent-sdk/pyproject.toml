[project]
name = "ya-agent-sdk"
dynamic = ["version"]
description = "Application framework for building AI agents with Pydantic AI - environment abstractions, session management, and hierarchical agent patterns"
authors = [{ name = "wh1isper", email = "jizhongsheng957@gmail.com" }]
readme = "README.md"
keywords = ["python"]
requires-python = ">=3.11,<3.14"
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "y-agent-environment==0.9.0",
    "anyio>=4.12.0",
    "cdp-use>=1.4.4,<2.0.0",
    "httpx>=0.28.1",
    "jinja2>=3.0.0",
    "pathspec>=0.12.0",
    "pillow>=10.0.0",
    "pydantic>=2.12.5",
    "pydantic-ai-slim>=1.79.0",
    "pydantic-settings>=2.0.0",
    "pyyaml>=6.0.0",
    "tenacity>=9.0.0",
    "typing-extensions>=4.15.0",
]

[project.urls]
Repository = "https://github.com/wh1isper/ya-mono"

[project.optional-dependencies]
examples = [
    "pydantic-ai",
    "python-dotenv",
]
docker = ["docker>=7.0.0"]
web = ["tavily-python>=0.7.0", "firecrawl-py>=4.0.0", "markitdown[docx,pptx,xlsx,xls,pdf]>=0.1.5"]
document = ["pymupdf>=1.26.6", "pymupdf4llm>=0.2.8", "markitdown[docx,pptx,xlsx,xls,pdf]>=0.1.5", "pymupdf-layout>=1.26.6"]
s3 = ["boto3>=1.34"]
tool-search = ["fastembed>=0.6", "numpy>=2.0"]
all = ["ya-agent-sdk[docker,web,document,s3,tool-search,examples]"]

[dependency-groups]
dev = [
    "pytest>=7.2.0",
    "pre-commit>=2.20.0",
    "pytest-asyncio>=0.25.3",
    "pytest-xdist>=3.0.0",
    "deptry>=0.22.0",
    "pyright>=1.1.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.9.2",
    "inline-snapshot>=0.20.0",
    "pytest-httpx>=0.35.0",
    "docker>=7.0.0",
    "tavily-python>=0.7.0",
    "firecrawl-py>=4.0.0",
    "markitdown[docx,pptx,xlsx,xls,pdf]>=0.1.5",
    "pymupdf>=1.26.6",
    "pymupdf4llm>=0.2.8",
    "pymupdf-layout>=1.26.6",
    "boto3>=1.34",
    "boto3-stubs[s3]>=1.34",
    "pydantic-ai",
    "python-dotenv",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.build.targets.wheel]
packages = ["ya_agent_sdk"]

[tool.deptry]
ignore = ["DEP001", "DEP002"]
per_rule_ignores = { DEP001 = ["anthropic"], DEP002 = ["ya-agent-sdk", "python-dotenv"], DEP003 = ["anthropic", "botocore"], DEP004 = ["pytest"] }
